name: Documentation correction
description: Report a public documentation typo, broken link, stale wording, or translation issue.
title: "Docs: "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, customer data, logs, screenshots with real vault records, tokens, certificates, or private infrastructure details. For boundary and redaction rules, see [public repository boundary](https://github.com/ucsahinn/vaultpilot/blob/main/docs/en/public-repository-boundary.md) and [public issue redaction](https://github.com/ucsahinn/vaultpilot/blob/main/kb/en/public-issue-redaction.md). For Chrome Web Store text, privacy categories, permission reasons, or screenshot rules, use [Chrome Web Store listing and privacy](https://github.com/ucsahinn/vaultpilot/blob/main/docs/en/chrome-web-store-listing.md) and [Chrome Web Store review KB](https://github.com/ucsahinn/vaultpilot/blob/main/kb/en/chrome-web-store-review.md).
  - type: dropdown
    id: surface
    attributes:
      label: Public surface
      description: Pick the public surface that needs correction.
      options:
        - README or localized README
        - Operator documentation
        - Knowledge base
        - Release notes or asset verification
        - Chrome Web Store listing or privacy wording
        - Screenshot or visual reference
        - GitHub issue, PR, or repository metadata
        - Other public documentation
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Page
      description: Link or path, for example docs/en/update-center.md.
      placeholder: docs/en/update-center.md, docs/en/chrome-web-store-listing.md
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the typo, stale wording, broken link, translation problem, or public metadata drift.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Suggested correction
      description: Provide public-safe replacement wording if you have it.
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Public safety check
      options:
        - label: This report does not include secrets, customer data, raw logs, private keys, certificates, databases, or screenshots with real secret records.
          required: true
